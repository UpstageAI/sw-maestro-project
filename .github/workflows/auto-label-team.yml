name: 이슈 라벨 자동 부여

on:
  issues:
    types: [opened]

jobs:
  add-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 이슈 본문에서 팀 번호 및 코치 이름 추출 후 라벨 부여
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labelsToAdd = [];

            // 팀 번호 추출 (team{번호} 패턴)
            const teamMatch = body.match(/team(\d+)/i);
            if (teamMatch) {
              const teamLabel = `Team ${teamMatch[1]}`;
              labelsToAdd.push({ name: teamLabel, color: '1D76DB', description: `팀 ${teamMatch[1]}` });
            }

            // 코치 이름 추출 ("### 코치" 섹션 아래 텍스트)
            const coachMatch = body.match(/###\s*코치\s*\n\s*(.+)/);
            if (coachMatch) {
              const coachName = coachMatch[1].trim();
              if (coachName) {
                labelsToAdd.push({ name: coachName, color: '6F42C1', description: `${coachName} 피드백` });
              }
            }

            if (labelsToAdd.length === 0) {
              console.log('추출할 라벨이 없습니다.');
              return;
            }

            // 라벨이 없으면 생성
            for (const label of labelsToAdd) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              }
            }

            // 이슈에 라벨 추가
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd.map(l => l.name),
            });

            console.log(`라벨 부여 완료: ${labelsToAdd.map(l => l.name).join(', ')}`);
