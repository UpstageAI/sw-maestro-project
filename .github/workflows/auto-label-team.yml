name: 이슈 라벨 자동 부여

on:
  issues:
    types: [opened]

jobs:
  add-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 이슈 본문에서 팀 번호 및 코치 이름 추출 후 라벨 부여
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labelsToAdd = [];

            // 팀 번호 추출 (team{번호} 패턴)
            const teamMatch = body.match(/team(\d+)/i);
            if (teamMatch) {
              const teamLabel = `Team ${teamMatch[1]}`;
              labelsToAdd.push({ name: teamLabel, color: '1D76DB', description: `팀 ${teamMatch[1]}` });
            }

            // 코치별 고유 색상 팔레트 (12명)
            const coachColors = [
              '6F42C1', // 보라
              '0E8A16', // 초록
              'D93F0B', // 주황
              '1D76DB', // 파랑 (진)
              'E4E669', // 노랑
              'C2185B', // 분홍
              '0D47A1', // 남색
              '00897B', // 청록
              '8D6E63', // 갈색
              'F57C00', // 오렌지
              '5C6BC0', // 인디고
              '43A047', // 연두
            ];

            // 코치 이름 추출 ("### 코치" 섹션 아래 텍스트)
            const coachMatch = body.match(/###\s*코치\s*\n\s*(.+)/);
            if (coachMatch) {
              const coachName = coachMatch[1].trim();
              if (coachName) {
                // 코치 이름으로 해시 생성하여 일관된 색상 배정
                let hash = 0;
                for (let i = 0; i < coachName.length; i++) {
                  hash = ((hash << 5) - hash) + coachName.charCodeAt(i);
                  hash = hash & hash;
                }
                const colorIndex = Math.abs(hash) % coachColors.length;
                labelsToAdd.push({ name: coachName, color: coachColors[colorIndex], description: `${coachName} 피드백` });
              }
            }

            if (labelsToAdd.length === 0) {
              console.log('추출할 라벨이 없습니다.');
              return;
            }

            // 라벨별로 개별 처리 (하나가 실패해도 나머지는 계속 진행)
            for (const label of labelsToAdd) {
              try {
                // 라벨 존재 여부 확인
                try {
                  await github.rest.issues.getLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                  });
                  console.log(`라벨 "${label.name}" 이미 존재합니다.`);
                } catch (e) {
                  if (e.status === 404) {
                    await github.rest.issues.createLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: label.name,
                      color: label.color,
                      description: label.description,
                    });
                    console.log(`라벨 "${label.name}" 생성 완료.`);
                  }
                }

                // 이슈에 라벨 추가
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: [label.name],
                });
                console.log(`라벨 "${label.name}" 부여 완료.`);
              } catch (e) {
                console.log(`라벨 "${label.name}" 처리 실패: ${e.message}`);
              }
            }
