name: "멘토 피드백"
description: "멘토가 팀 프로젝트에 대한 피드백을 제공합니다."
title: "[피드백] 팀N - 피드백 제목"
labels: ["피드백"]
body:
  - type: dropdown
    id: team
    attributes:
      label: "팀"
      description: "피드백 대상 팀을 선택하세요."
      options:
        - Team 1
        - Team 2
        - Team 3
        - Team 4
        - Team 5
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: "피드백 카테고리"
      description: "피드백의 종류를 선택하세요."
      options:
        - 코드 품질
        - 아키텍처/설계
        - 기능 구현
        - 문서화
        - 테스트
        - 성능
        - 보안
        - 기타
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      description: "피드백의 중요도를 선택하세요."
      options:
        - "높음 - 반드시 수정 필요"
        - "중간 - 수정 권장"
        - "낮음 - 참고 사항"
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: "피드백 내용"
      description: "구체적인 피드백을 작성해주세요."
      placeholder: "피드백 내용을 여기에 작성하세요..."
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: "개선 제안"
      description: "개선 방향이나 참고 자료를 제시해주세요."
      placeholder: "개선 방향을 여기에 작성하세요..."
    validations:
      required: false
